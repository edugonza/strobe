<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .strobe-fill { fill: #FF6B35; }
      .strobe-stroke { stroke: #FF6B35; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <!-- Central dot -->
  <circle cx="100" cy="100" r="15" class="strobe-fill"/>

  <!-- Three expanding rings (strobe pulse effect) -->
  <circle cx="100" cy="100" r="35" class="strobe-stroke" opacity="0.7"/>
  <circle cx="100" cy="100" r="55" class="strobe-stroke" opacity="0.4"/>
  <circle cx="100" cy="100" r="75" class="strobe-stroke" opacity="0.15"/>
</svg>
